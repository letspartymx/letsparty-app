<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#55524F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Calendario · Let's Party</title>
  <link rel="icon" href="https://res.cloudinary.com/db8kubeqq/image/upload/v1782009129/letsparty-logo_nt6adc.png" />
  <style>
    :root {
      --fondo:     #FBF8F1;
      --principal: #55524F;
      --detalle:   #EFE6DD;
      --acento:    #C2AFA0;
      --blanco:    #ffffff;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --sidebar:   220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--fondo);
      color: var(--principal);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar);
      min-height: 100vh;
      background: var(--principal);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
    }
    .sidebar-logo img { height: 120px; width: auto; }
    .sidebar-nav { flex: 1; padding: 16px 0; list-style: none; }
    .sidebar-nav li a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; font-size: 13px; font-weight: 400;
      color: rgba(251,248,241,0.6); letter-spacing: 0.04em;
      text-decoration: none; transition: color 0.2s, background 0.2s;
    }
    .sidebar-nav li a:hover { color: var(--fondo); background: rgba(255,255,255,0.06); }
    .sidebar-nav li a.activo { color: var(--fondo); background: rgba(255,255,255,0.12); }
    .sidebar-nav li a svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn-logout {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(251,248,241,0.6); font-family: var(--sans);
      font-size: 12px; padding: 10px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.08); color: var(--fondo); }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(85,82,79,0.45); z-index: 99;
    }
    .sidebar-overlay.visible { display: block; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar); flex: 1; padding: 32px; transition: margin 0.3s; }

    /* ── Topbar mobile ── */
    .topbar-mobile {
      display: none; align-items: center; justify-content: space-between;
      margin-bottom: 24px; position: relative; padding-top: 8px; min-height: 64px;
    }
    .topbar-mobile img { height: 50px; width: auto; position: absolute; left: 50%; transform: translateX(-50%); }
    .btn-hamburguesa {
      background: var(--principal); border: none; border-radius: 10px;
      padding: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .btn-hamburguesa svg { width: 20px; height: 20px; }

    /* ── Cabecera calendario ── */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
    }
    .cal-titulo { font-family: var(--serif); font-size: 32px; font-weight: 300; }
    .cal-titulo em { font-style: italic; color: var(--acento); }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .btn-nav {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 8px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-nav:hover { border-color: var(--acento); background: var(--fondo); }
    .mes-label {
      font-family: var(--serif); font-size: 20px; font-weight: 300;
      min-width: 160px; text-align: center; text-transform: capitalize;
    }
    .btn-hoy {
      background: var(--principal); color: var(--fondo);
      border: none; border-radius: 999px;
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      padding: 0 14px; height: 30px; cursor: pointer;
    }

    /* ── Grid ── */
    .cal-grid-wrap { display: block; }
    .cal-dias-semana { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
    .dia-semana { text-align: center; font-size: 10px; font-weight: 500; color: var(--acento); text-transform: uppercase; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-celda {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 10px; min-height: 100px; padding: 8px; transition: all 0.15s;
    }
    .cal-celda.otro-mes { background: transparent; border-color: transparent; opacity: 0.3; }
    .cal-celda.hoy { border-color: var(--acento); background: #faf6f0; }
    .cal-celda.tiene-eventos { cursor: pointer; }
    .cal-celda.tiene-eventos:hover { border-color: var(--acento); transform: translateY(-2px); }
    .cal-num { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
    .cal-num-hoy {
      background: var(--principal); color: var(--fondo);
      border-radius: 50%; width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
    }

    .cal-evento-pill {
      display: block; background: var(--detalle); color: var(--principal);
      border-radius: 4px; padding: 2px 6px; font-size: 10px;
      margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cal-mas { font-size: 10px; color: var(--acento); font-weight: 600; padding-left: 4px; }

    /* ── Vista Lista ── */
    .vista-lista { display: none; }
    .lista-ev-card {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 12px; padding: 14px; display: grid;
      grid-template-columns: 50px 1fr auto; gap: 12px; align-items: center;
      margin-bottom: 8px; text-decoration: none; color: inherit;
    }
    .lista-fecha-box { background: var(--fondo); border-radius: 8px; padding: 6px; text-align: center; }
    .lista-dia { font-family: var(--serif); font-size: 20px; line-height: 1; }
    .lista-mes-abr { font-size: 9px; font-weight: 600; color: var(--acento); }
    .lista-info h3 { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .lista-info span { font-size: 11px; opacity: 0.6; }
    .lista-orden { font-size: 10px; background: var(--detalle); padding: 3px 8px; border-radius: 999px; }

    /* ── Panel lateral ── */
    .panel-dia {
      position: fixed; top: 0; right: -350px; bottom: 0; width: 320px;
      background: var(--fondo); border-left: 1px solid var(--detalle);
      z-index: 200; transition: right 0.3s; display: flex; flex-direction: column;
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
    }
    .panel-dia.visible { right: 0; }
    .panel-overlay { display: none; position: fixed; inset: 0; background: rgba(85,82,79,0.3); z-index: 199; }
    .panel-overlay.visible { display: block; }
    .panel-header { padding: 20px; border-bottom: 1px solid var(--detalle); display: flex; justify-content: space-between; align-items: center; }
    .panel-fecha { font-family: var(--serif); font-size: 22px; }
    .panel-lista { padding: 16px; overflow-y: auto; }
    .panel-card {
      background: var(--blanco); border: 1px solid var(--detalle); border-radius: 12px;
      padding: 15px; margin-bottom: 10px; display: block; text-decoration: none; color: inherit;
    }

    @media (max-width: 680px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.abierto { transform: translateX(0); }
      .main { margin-left: 0; padding: 16px; }
      .topbar-mobile { display: flex; }
      .cal-grid-wrap { display: none; }
      .vista-lista { display: block; }
      .cal-titulo { font-size: 24px; }
      .panel-dia { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="https://res.cloudinary.com/db8kubeqq/image/upload/v1782009129/letsparty-logo_nt6adc.png" alt="Let's Party" />
    </div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="calendario.html" class="activo">Calendario</a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main">
    <div class="topbar-mobile">
      <button class="btn-hamburguesa" id="btn-hamburguesa">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FBF8F1" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <img src="https://res.cloudinary.com/db8kubeqq/image/upload/v1782009129/letsparty-logo_nt6adc.png" alt="Let's Party" />
    </div>

    <div class="cal-header">
      <h1 class="cal-titulo">Calen<em>dario</em></h1>
      <div class="cal-nav">
        <button class="btn-nav" id="btn-prev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
        <span class="mes-label" id="mes-label"></span>
        <button class="btn-nav" id="btn-next"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
        <button class="btn-hoy" id="btn-hoy">Hoy</button>
      </div>
    </div>

    <div class="cal-grid-wrap">
      <div class="cal-dias-semana">
        <div class="dia-semana">Dom</div><div class="dia-semana">Lun</div><div class="dia-semana">Mar</div>
        <div class="dia-semana">Mié</div><div class="dia-semana">Jue</div><div class="dia-semana">Vie</div>
        <div class="dia-semana">Sáb</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="vista-lista" id="vista-lista"></div>
  </main>

  <div class="panel-overlay" id="panel-overlay"></div>
  <aside class="panel-dia" id="panel-dia">
    <div class="panel-header">
      <div class="panel-fecha" id="panel-fecha"></div>
      <button id="btn-cerrar-panel" style="background:none; border:none; cursor:pointer;">Cerrar</button>
    </div>
    <div class="panel-lista" id="panel-lista"></div>
  </aside>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6nm7Ttl2Iuevbp6gp-GsBk4-06I6Z5Bc",
      authDomain: "letsparty-db.firebaseapp.com",
      projectId: "letsparty-db",
      storageBucket: "letsparty-db.firebasestorage.app",
      messagingSenderId: "274690779810",
      appId: "1:274690779810:web:ce6f54b3ce8b39248505fb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, u => { if (!u) window.location.href = "index.html"; });
    document.getElementById("btn-logout").onclick = () => signOut(auth);

    // Sidebar Mobile
    const sidebar = document.getElementById("sidebar");
    const sidebarOvl = document.getElementById("sidebar-overlay");
    document.getElementById("btn-hamburguesa").onclick = () => { sidebar.classList.add("abierto"); sidebarOvl.classList.add("visible"); };
    sidebarOvl.onclick = () => { sidebar.classList.remove("abierto"); sidebarOvl.classList.remove("visible"); };

    // --- CALENDARIO LOGIC ---
    let eventos = [];
    let hoy = new Date();
    let mesActual = new Date(hoy.getFullYear(), hoy.getMonth(), 1);

    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const MESES_ABR = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

    // Cargar datos
    onSnapshot(query(collection(db, "eventos"), orderBy("fecha", "asc")), snap => {
      eventos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    });

    function render() {
      const anio = mesActual.getFullYear();
      const mes = mesActual.getMonth();
      document.getElementById("mes-label").textContent = `${MESES[mes]} ${anio}`;
      
      renderGrid(anio, mes);
      renderLista(anio, mes);
    }

    function renderGrid(anio, mes) {
      const grid = document.getElementById("cal-grid");
      grid.innerHTML = "";
      
      const primerDia = new Date(anio, mes, 1).getDay();
      const diasMes = new Date(anio, mes + 1, 0).getDate();
      const diasMesAnt = new Date(anio, mes, 0).getDate();
      const todayStr = hoy.toISOString().split('T')[0];

      // Días previo mes
      for (let i = 0; i < primerDia; i++) {
        const d = diasMesAnt - primerDia + i + 1;
        grid.innerHTML += `<div class="cal-celda otro-mes"><div class="cal-num">${d}</div></div>`;
      }

      // Días mes actual
      for (let d = 1; d <= diasMes; d++) {
        const fechaStr = `${anio}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const evsDia = eventos.filter(e => e.fecha === fechaStr);
        const esHoy = (anio === hoy.getFullYear() && mes === hoy.getMonth() && d === hoy.getDate());

        const celda = document.createElement("div");
        celda.className = `cal-celda ${esHoy ? 'hoy' : ''} ${evsDia.length ? 'tiene-eventos' : ''}`;
        
        let html = `<div class="cal-num">${esHoy ? `<span class="cal-num-hoy">${d}</span>` : d}</div>`;
        evsDia.slice(0, 2).forEach(e => { html += `<div class="cal-evento-pill">${e.cliente}</div>`; });
        if (evsDia.length > 2) html += `<div class="cal-mas">+${evsDia.length - 2} más</div>`;
        
        celda.innerHTML = html;
        if (evsDia.length) celda.onclick = () => abrirPanel(fechaStr, evsDia);
        grid.appendChild(celda);
      }
    }

    function renderLista(anio, mes) {
      const lista = document.getElementById("vista-lista");
      const prefijo = `${anio}-${String(mes+1).padStart(2,'0')}`;
      const evsMes = eventos.filter(e => e.fecha && e.fecha.startsWith(prefijo));

      if (!evsMes.length) {
        lista.innerHTML = `<div style="text-align:center; padding:40px; opacity:0.5;">No hay eventos este mes</div>`;
        return;
      }

      lista.innerHTML = evsMes.map(e => {
        const dia = e.fecha.split("-")[2];
        return `
          <a href="eventos.html" class="lista-ev-card">
            <div class="lista-fecha-box">
              <div class="lista-dia">${parseInt(dia)}</div>
              <div class="lista-mes-abr">${MESES_ABR[mes]}</div>
            </div>
            <div class="lista-info">
              <h3>${e.cliente}</h3>
              <span>${e.hora || '--:--'} · ${e.venue || 'Sin lugar'}</span>
            </div>
            <div class="lista-orden">${e.orden}</div>
          </a>`;
      }).join("");
    }

    function abrirPanel(fecha, evs) {
      const [y, m, d] = fecha.split("-");
      document.getElementById("panel-fecha").textContent = `${d} de ${MESES[parseInt(m)-1]}`;
      document.getElementById("panel-lista").innerHTML = evs.map(e => `
        <a href="eventos.html" class="panel-card">
          <div style="font-size:10px; color:var(--acento); font-weight:600;">${e.orden}</div>
          <div style="font-size:16px; font-weight:500; margin:4px 0;">${e.cliente}</div>
          <div style="font-size:12px; opacity:0.6;">${e.hora || ''} · ${e.venue || ''}</div>
        </a>`).join("");
      document.getElementById("panel-dia").classList.add("visible");
      document.getElementById("panel-overlay").classList.add("visible");
    }

    function cerrarPanel() {
      document.getElementById("panel-dia").classList.remove("visible");
      document.getElementById("panel-overlay").classList.remove("visible");
    }

    document.getElementById("btn-cerrar-panel").onclick = cerrarPanel;
    document.getElementById("panel-overlay").onclick = cerrarPanel;

    // Nav
    document.getElementById("btn-prev").onclick = () => { mesActual.setMonth(mesActual.getMonth() - 1); render(); };
    document.getElementById("btn-next").onclick = () => { mesActual.setMonth(mesActual.getMonth() + 1); render(); };
    document.getElementById("btn-hoy").onclick = () => { mesActual = new Date(hoy.getFullYear(), hoy.getMonth(), 1); render(); };

    window.onresize = render;
  </script>
</body>
</html>
