<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#55524F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Calendario · Let's Party</title>
  <link rel="icon" href="https://res.cloudinary.com/db8kubeqq/image/upload/v1782009129/letsparty-logo_nt6adc.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --fondo:     #FBF8F1;
      --principal: #55524F;
      --detalle:   #EFE6DD;
      --acento:    #C2AFA0;
      --blanco:    #ffffff;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --sidebar:   220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--fondo);
      color: var(--principal);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar);
      min-height: 100vh;
      background: var(--principal);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
    }
    .sidebar-logo img { height: 120px; width: auto; }
    .sidebar-nav { flex: 1; padding: 16px 0; list-style: none; }
    .sidebar-nav li a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; font-size: 13px; font-weight: 400;
      color: rgba(251,248,241,0.6); letter-spacing: 0.04em;
      text-decoration: none; transition: color 0.2s, background 0.2s;
    }
    .sidebar-nav li a:hover { color: var(--fondo); background: rgba(255,255,255,0.06); }
    .sidebar-nav li a.activo { color: var(--fondo); background: rgba(255,255,255,0.12); }
    .sidebar-nav li a svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn-logout {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(251,248,241,0.6); font-family: var(--sans);
      font-size: 12px; padding: 10px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.08); color: var(--fondo); }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(85,82,79,0.45); z-index: 99;
    }
    .sidebar-overlay.visible { display: block; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar); flex: 1; padding: 32px; }

    /* ── Topbar mobile ── */
    .topbar-mobile {
      display: none; align-items: center; justify-content: space-between;
      margin-bottom: 24px; position: relative; padding-top: 8px; min-height: 96px;
    }
    .topbar-mobile img { height: 80px; width: auto; position: absolute; left: 50%; transform: translateX(-50%); }
    .btn-hamburguesa {
      background: var(--principal); border: none; border-radius: 10px;
      padding: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .btn-hamburguesa svg { width: 20px; height: 20px; }

    /* ── Cabecera calendario ── */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; gap: 12px;
    }
    .cal-titulo {
      font-family: var(--serif); font-size: 32px; font-weight: 300;
    }
    .cal-titulo em { font-style: italic; color: var(--acento); }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .btn-nav {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 8px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .btn-nav:hover { border-color: var(--acento); background: var(--fondo); }
    .btn-nav svg { width: 14px; height: 14px; }
    .mes-label {
      font-family: var(--serif); font-size: 20px; font-weight: 300;
      min-width: 180px; text-align: center; text-transform: capitalize;
    }
    .btn-hoy {
      background: var(--principal); color: var(--fondo);
      border: none; border-radius: 999px;
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; padding: 0 14px; height: 30px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-hoy:hover { background: var(--acento); }

    /* ── Grid días de semana ── */
    .cal-dias-semana {
      display: grid; grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }
    .dia-semana {
      text-align: center; font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--acento); padding: 6px 0;
    }

    /* ── Grid calendario ── */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-celda {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 10px; min-height: 90px; padding: 8px;
      transition: border-color 0.15s;
      cursor: default;
    }
    .cal-celda.otro-mes { background: transparent; border-color: transparent; }
    .cal-celda.otro-mes .cal-num { opacity: 0.25; }
    .cal-celda.hoy { border-color: var(--acento); background: #faf6f0; }
    .cal-celda.tiene-eventos { cursor: pointer; }
    .cal-celda.tiene-eventos:hover { border-color: var(--acento); box-shadow: 0 2px 12px rgba(85,82,79,0.08); }

    .cal-num {
      font-size: 13px; font-weight: 500; margin-bottom: 4px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cal-num-hoy {
      background: var(--principal); color: var(--fondo);
      border-radius: 50%; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    .cal-evento-pill {
      display: block; width: 100%;
      background: var(--detalle); color: var(--principal);
      border-radius: 5px; padding: 2px 6px;
      font-size: 10px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px; cursor: pointer;
      transition: background 0.15s;
    }
    .cal-evento-pill:hover { background: var(--acento); }
    .cal-mas {
      font-size: 10px; color: var(--acento); font-weight: 500;
      padding: 1px 4px;
    }

    /* ── Panel lateral eventos del día ── */
    .panel-dia {
      display: none; position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 320px; background: var(--fondo);
      border-left: 1px solid var(--detalle);
      z-index: 200; flex-direction: column;
      box-shadow: -8px 0 32px rgba(85,82,79,0.12);
    }
    .panel-dia.visible { display: flex; }
    .panel-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(85,82,79,0.3); z-index: 199;
    }
    .panel-overlay.visible { display: block; }

    .panel-header {
      padding: 20px; border-bottom: 1px solid var(--detalle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-fecha {
      font-family: var(--serif); font-size: 24px; font-weight: 300;
    }
    .panel-fecha em { font-style: italic; color: var(--acento); }
    .btn-cerrar-panel {
      background: none; border: none; cursor: pointer; color: var(--acento);
      display: flex; align-items: center;
    }
    .btn-cerrar-panel svg { width: 18px; height: 18px; }

    .panel-lista { flex: 1; overflow-y: auto; padding: 16px; }
    .panel-card {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 12px; padding: 16px; margin-bottom: 10px;
      cursor: pointer; transition: box-shadow 0.15s, transform 0.15s;
      text-decoration: none; color: inherit; display: block;
    }
    .panel-card:hover { box-shadow: 0 4px 16px rgba(85,82,79,0.1); transform: translateY(-1px); }
    .panel-orden {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--acento); margin-bottom: 6px;
    }
    .panel-cliente {
      font-size: 16px; font-weight: 500; margin-bottom: 4px;
    }
    .panel-meta {
      font-size: 12px; opacity: 0.5; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .panel-meta span { display: flex; align-items: center; gap: 4px; }
    .panel-meta svg { width: 11px; height: 11px; }

    /* ── Vista lista (mobile) ── */
    .vista-lista { display: none; }
    .lista-mes-grupo { margin-bottom: 24px; }
    .lista-mes-titulo {
      font-family: var(--serif); font-size: 20px; font-weight: 300;
      font-style: italic; color: var(--acento);
      margin-bottom: 10px; text-transform: capitalize;
    }
    .lista-ev-card {
      background: var(--blanco); border: 1px solid var(--detalle);
      border-radius: 12px; padding: 14px 16px;
      display: grid; grid-template-columns: 48px 1fr auto;
      gap: 12px; align-items: center;
      margin-bottom: 8px; cursor: pointer;
      text-decoration: none; color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .lista-ev-card:hover { box-shadow: 0 2px 12px rgba(85,82,79,0.08); transform: translateY(-1px); }
    .lista-fecha-box {
      background: var(--fondo); border-radius: 8px;
      padding: 6px 4px; text-align: center;
    }
    .lista-dia { font-family: var(--serif); font-size: 22px; font-weight: 300; line-height: 1; }
    .lista-mes-abr { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--acento); }
    .lista-info h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .lista-info span { font-size: 11px; opacity: 0.5; }
    .lista-orden {
      font-size: 10px; font-weight: 500; color: var(--acento);
      background: var(--detalle); padding: 3px 8px; border-radius: 999px;
    }

    /* ── Toggle vista ── */
    .toggle-vista {
      display: flex; gap: 6px; background: var(--blanco);
      border: 1px solid var(--detalle); border-radius: 8px; padding: 3px;
    }
    .btn-vista {
      background: none; border: none; border-radius: 6px;
      padding: 5px 8px; cursor: pointer; color: var(--acento);
      transition: background 0.15s, color 0.15s;
    }
    .btn-vista.activo { background: var(--principal); color: var(--fondo); }
    .btn-vista svg { width: 14px; height: 14px; display: block; }

    /* Toast */
    .toast {
      position: fixed; bottom: 16px; right: 16px;
      background: var(--principal); color: var(--fondo);
      font-size: 12px; padding: 9px 14px; border-radius: 8px;
      z-index: 400; transform: translateY(50px); opacity: 0;
      transition: all 0.25s;
    }
    .toast.visible { transform: translateY(0); opacity: 1; }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      body { display: block; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.abierto { transform: translateX(0); }
      .main { margin-left: 0; padding: 16px 14px; }
      .topbar-mobile { display: flex; }
      .cal-grid-wrap { display: none; }
      .vista-lista { display: block; }
      .toggle-vista { display: none; }
      .cal-titulo { font-size: 24px; }
      .mes-label { font-size: 16px; min-width: 140px; }
      .panel-dia { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="https://res.cloudinary.com/db8kubeqq/image/upload/v1782009129/letsparty-logo_nt6adc.png" alt="Let's Party" />
    </div>
    <ul class="sidebar-nav">
      <li>
        <a href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
      </li>
      <li>
        <a href="eventos.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Eventos
        </a>
      </li>
      <li>
        <a href="calendario.html" class="activo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><circle cx="8" cy="16" r="1" fill="currentColor"/><circle cx="12" cy="16" r="1" fill="currentColor"/><circle cx="16" cy="16" r="1" fill="currentColor"/></svg>
          Calendario
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main -->
  <main class="main">

    <!-- Topbar mobile -->
    <div class="topbar-mobile">
      <button class="btn-hamburguesa" id="btn-hamburguesa">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FBF8F1" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <img src="https://res.cloudinary.com/db8kubeqq/image/upload/v1782009129/letsparty-logo_nt6adc.png" alt="Let's Party" />
    </div>

    <!-- Cabecera -->
    <div class="cal-header">
      <h1 class="cal-titulo">Calen<em>dario</em></h1>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="toggle-vista">
          <button class="btn-vista activo" id="btn-grid" title="Vista cuadrícula">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="btn-vista" id="btn-lista" title="Vista lista">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          </button>
        </div>
        <div class="cal-nav">
          <button class="btn-nav" id="btn-prev">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="mes-label" id="mes-label"></span>
          <button class="btn-nav" id="btn-next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <button class="btn-hoy" id="btn-hoy">Hoy</button>
      </div>
    </div>

    <!-- Vista cuadrícula -->
    <div class="cal-grid-wrap">
      <div class="cal-dias-semana">
        <div class="dia-semana">Dom</div>
        <div class="dia-semana">Lun</div>
        <div class="dia-semana">Mar</div>
        <div class="dia-semana">Mié</div>
        <div class="dia-semana">Jue</div>
        <div class="dia-semana">Vie</div>
        <div class="dia-semana">Sáb</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Vista lista (mobile y toggle) -->
    <div class="vista-lista" id="vista-lista"></div>

  </main>

  <!-- Panel lateral día -->
  <div class="panel-overlay" id="panel-overlay"></div>
  <aside class="panel-dia" id="panel-dia">
    <div class="panel-header">
      <div class="panel-fecha" id="panel-fecha"></div>
      <button class="btn-cerrar-panel" id="btn-cerrar-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="panel-lista" id="panel-lista"></div>
  </aside>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, enableIndexedDbPersistence, collection, onSnapshot, query, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6nm7Ttl2Iuevbp6gp-GsBk4-06I6Z5Bc",
      authDomain: "letsparty-db.firebaseapp.com",
      projectId: "letsparty-db",
      storageBucket: "letsparty-db.firebasestorage.app",
      messagingSenderId: "274690779810",
      appId: "1:274690779810:web:ce6f54b3ce8b39248505fb"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    enableIndexedDbPersistence(db).catch(() => {});

    // Auth guard
    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "index.html";
    });

    // Logout
    document.getElementById("btn-logout").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    // Hamburguesa
    const sidebar  = document.getElementById("sidebar");
    const overlay  = document.getElementById("sidebar-overlay");
    document.getElementById("btn-hamburguesa").addEventListener("click", () => {
      sidebar.classList.add("abierto");
      overlay.classList.add("visible");
    });
    overlay.addEventListener("click", () => {
      sidebar.classList.remove("abierto");
      overlay.classList.remove("visible");
    });

    // ── Estado ──
    let eventos   = [];
    let hoy       = new Date();
    let mesActual = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    let vistaGrid = true;

    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                   "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const MESES_CORTO = ["ENE","FEB","MAR","ABR","MAY","JUN",
                         "JUL","AGO","SEP","OCT","NOV","DIC"];

    // ── Firestore ──
    const q = query(collection(db, "eventos"), orderBy("fecha", "asc"));
    onSnapshot(q, (snap) => {
      eventos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    });

    // ── Navegación ──
    document.getElementById("btn-prev").addEventListener("click", () => {
      mesActual = new Date(mesActual.getFullYear(), mesActual.getMonth() - 1, 1);
      render();
    });
    document.getElementById("btn-next").addEventListener("click", () => {
      mesActual = new Date(mesActual.getFullYear(), mesActual.getMonth() + 1, 1);
      render();
    });
    document.getElementById("btn-hoy").addEventListener("click", () => {
      mesActual = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      render();
    });

    // ── Toggle vista ──
    document.getElementById("btn-grid").addEventListener("click", () => {
      vistaGrid = true;
      document.getElementById("btn-grid").classList.add("activo");
      document.getElementById("btn-lista").classList.remove("activo");
      document.querySelector(".cal-grid-wrap").style.display = "";
      document.getElementById("vista-lista").style.display = "none";
    });
    document.getElementById("btn-lista").addEventListener("click", () => {
      vistaGrid = false;
      document.getElementById("btn-lista").classList.add("activo");
      document.getElementById("btn-grid").classList.remove("activo");
      document.querySelector(".cal-grid-wrap").style.display = "none";
      document.getElementById("vista-lista").style.display = "block";
      renderLista();
    });

    // ── Panel día ──
    const panelDia     = document.getElementById("panel-dia");
    const panelOverlay = document.getElementById("panel-overlay");
    const panelFecha   = document.getElementById("panel-fecha");
    const panelLista   = document.getElementById("panel-lista");

    function abrirPanel(fecha, evs) {
      const [anio, mes, dia] = fecha.split("-");
      panelFecha.innerHTML = `${parseInt(dia)} <em>${MESES[parseInt(mes)-1]} ${anio}</em>`;
      panelLista.innerHTML = evs.map(ev => `
        <a class="panel-card" href="eventos.html">
          <div class="panel-orden">${ev.orden || "—"}</div>
          <div class="panel-cliente">${ev.cliente || "Sin nombre"}</div>
          <div class="panel-meta">
            ${ev.hora ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>${ev.hora}</span>` : ""}
            ${ev.venue ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21s-7-6.686-7-11a7 7 0 1114 0c0 4.314-7 11-7 11z"/><circle cx="12" cy="10" r="2"/></svg>${ev.venue}</span>` : ""}
          </div>
        </a>`).join("");
      panelDia.classList.add("visible");
      panelOverlay.classList.add("visible");
    }

    document.getElementById("btn-cerrar-panel").addEventListener("click", cerrarPanel);
    panelOverlay.addEventListener("click", cerrarPanel);
    function cerrarPanel() {
      panelDia.classList.remove("visible");
      panelOverlay.classList.remove("visible");
    }

    // ── Render principal ──
    function render() {
      document.getElementById("mes-label").textContent =
        `${MESES[mesActual.getMonth()]} ${mesActual.getFullYear()}`;
      renderGrid();
      if (!vistaGrid) renderLista();
    }

    function renderGrid() {
      const grid = document.getElementById("cal-grid");
      grid.innerHTML = "";

      const anio = mesActual.getFullYear();
      const mes  = mesActual.getMonth();
      const primerDia = new Date(anio, mes, 1).getDay();
      const diasEnMes = new Date(anio, mes + 1, 0).getDate();
      const diasMesAnt = new Date(anio, mes, 0).getDate();
      const todayStr = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,"0")}-${String(hoy.getDate()).padStart(2,"0")}`;

      // Mapa de eventos por fecha
      const evMap = {};
      eventos.forEach(ev => {
        if (!ev.fecha) return;
        if (!evMap[ev.fecha]) evMap[ev.fecha] = [];
        evMap[ev.fecha].push(ev);
      });

      // Celdas mes anterior
      for (let i = 0; i < primerDia; i++) {
        const d = diasMesAnt - primerDia + i + 1;
        const celda = document.createElement("div");
        celda.className = "cal-celda otro-mes";
        celda.innerHTML = `<div class="cal-num"><span>${d}</span></div>`;
        grid.appendChild(celda);
      }

      // Celdas mes actual
      for (let d = 1; d <= diasEnMes; d++) {
        const fechaStr = `${anio}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const evsDia = evMap[fechaStr] || [];
        const esHoy = fechaStr === todayStr;

        const celda = document.createElement("div");
        celda.className = `cal-celda${esHoy ? " hoy" : ""}${evsDia.length > 0 ? " tiene-eventos" : ""}`;

        const numEl = esHoy
          ? `<span class="cal-num-hoy">${d}</span>`
          : `<span>${d}</span>`;

        let pillsHTML = "";
        const max = 2;
        evsDia.slice(0, max).forEach(ev => {
          pillsHTML += `<span class="cal-evento-pill" title="${ev.cliente}">${ev.cliente || "Evento"}</span>`;
        });
        if (evsDia.length > max) {
          pillsHTML += `<span class="cal-mas">+${evsDia.length - max} más</span>`;
        }

        celda.innerHTML = `<div class="cal-num">${numEl}</div>${pillsHTML}`;

        if (evsDia.length > 0) {
          celda.addEventListener("click", () => abrirPanel(fechaStr, evsDia));
        }

        grid.appendChild(celda);
      }

      // Celdas mes siguiente
      const total = primerDia + diasEnMes;
      const restantes = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let i = 1; i <= restantes; i++) {
        const celda = document.createElement("div");
        celda.className = "cal-celda otro-mes";
        celda.innerHTML = `<div class="cal-num"><span>${i}</span></div>`;
        grid.appendChild(celda);
      }
    }

    function renderLista() {
      const contenedor = document.getElementById("vista-lista");
      contenedor.innerHTML = "";

      const anio = mesActual.getFullYear();
      const mes  = mesActual.getMonth();
      const prefijo = `${anio}-${String(mes+1).padStart(2,"0")}`;

      const evsMes = eventos.filter(ev => ev.fecha && ev.fecha.startsWith(prefijo));
      evsMes.sort((a, b) => a.fecha.localeCompare(b.fecha));

      if (evsMes.length === 0) {
        contenedor.innerHTML = `
          <div style="text-align:center;padding:60px 20px">
            <p style="font-family:var(--serif);font-size:20px;font-style:italic;color:var(--acento);margin-bottom:6px">Sin eventos este mes</p>
            <span style="font-size:13px;opacity:0.45">No hay eventos registrados para ${MESES[mes]} ${anio}</span>
          </div>`;
        return;
      }

      evsMes.forEach(ev => {
        const [, , dia] = ev.fecha.split("-");
        const mesIdx = parseInt(ev.fecha.split("-")[1]) - 1;
        contenedor.innerHTML += `
          <a class="lista-ev-card" href="eventos.html">
            <div class="lista-fecha-box">
              <div class="lista-dia">${parseInt(dia)}</div>
              <div class="lista-mes-abr">${MESES_CORTO[mesIdx]}</div>
            </div>
            <div class="lista-info">
              <h3>${ev.cliente || "Sin nombre"}</h3>
              <span>${ev.venue || "—"} · ${ev.hora || "—"}</span>
            </div>
            <span class="lista-orden">${ev.orden || "—"}</span>
          </a>`;
      });
    }

    // Render inicial
    render();
  </script>

  <script>
    if ('serviceWorker' in navigator)
      window.addEventListener('load', () => navigator.serviceWorker.register('/letsparty-app/sw.js'));
  </script>

</body>
</html>
